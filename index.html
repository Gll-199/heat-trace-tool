<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<style>
:root {
  --bg: #f5f6f8;
  --surface: #ffffff;
  --border: #e2e4e8;
  --text: #1a1d23;
  --text2: #5e6470;
  --accent: #2563eb;
  --accent2: #dbeafe;
  --green: #059669;
  --green2: #d1fae5;
  --amber: #d97706;
  --amber2: #fef3c7;
  --red: #dc2626;
  --radius: 8px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.logo { display: flex; align-items: center; gap: 10px; font-size: 18px; font-weight: 600; }
.logo-icon { width: 28px; height: 28px; background: var(--accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 16px; }
.layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 20px; max-width: 1440px; margin: 0 auto; }
@media (max-width: 900px) { .layout { grid-template-columns: 1fr; } }
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 16px;
}
.card-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.inquiry-input {
  width: 100%;
  min-height: 180px;
  padding: 12px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 14px;
  line-height: 1.6;
  resize: vertical;
  font-family: inherit;
  transition: border-color .2s;
}
.inquiry-input:focus { outline: none; border-color: var(--accent); }
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--surface);
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  transition: all .15s;
}
.btn:hover { background: var(--bg); }
.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-primary:hover { opacity: .9; }
.toolbar { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
.param-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
@media (max-width: 600px) { .param-grid { grid-template-columns: 1fr; } }
.param-field label {
  display: block;
  font-size: 12px;
  font-weight: 500;
  color: var(--text2);
  margin-bottom: 3px;
}
.param-field input, .param-field select, .param-field textarea {
  width: 100%;
  padding: 7px 10px;
  border: 1px solid var(--border);
  border-radius: 5px;
  font-size: 13px;
  font-family: inherit;
  transition: border-color .2s;
}
.param-field input:focus, .param-field select:focus, .param-field textarea:focus {
  outline: none;
  border-color: var(--accent);
}
.param-field textarea { min-height: 50px; resize: vertical; }
.output-section { display: none; }
.output-section.visible { display: block; }
.reply-output {
  width: 100%;
  min-height: 300px;
  padding: 14px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 13px;
  line-height: 1.7;
  resize: vertical;
  font-family: inherit;
  white-space: pre-wrap;
  background: #fafbfc;
}
.section-tabs {
  display: flex;
  gap: 4px;
  margin-bottom: 12px;
  border-bottom: 1px solid var(--border);
}
.section-tab {
  padding: 8px 14px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  border: none;
  background: transparent;
  color: var(--text2);
  border-bottom: 2px solid transparent;
  transition: all .15s;
}
.section-tab:hover { color: var(--text); }
.section-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.param-category { margin-bottom: 16px; }
.param-category-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 8px;
  padding-bottom: 4px;
  border-bottom: 1px solid var(--border);
}
.progress-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 12px;
  font-size: 12px;
  color: var(--text2);
}
.progress-track {
  flex: 1;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width .3s ease;
}
.quick-info {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 12px;
}
.quick-info-item {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 4px 10px;
  background: var(--accent2);
  color: var(--accent);
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
}
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--text2);
}
.empty-state p { font-size: 14px; margin-top: 8px; }
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--text);
  color: #fff;
  padding: 10px 20px;
  border-radius: 8px;
  font-size: 13px;
  opacity: 0;
  transition: opacity .3s;
  pointer-events: none;
  z-index: 999;
}
.toast.show { opacity: 1; }
</style>
</head>

      <div class="card" style="background:linear-gradient(135deg,#fef3c7,#fffbeb);border-color:#fbbf24;">

<script>
function switchParamTab(tabId, btn) {
  document.querySelectorAll('.section-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  ['basic','pipe','temp','electrical'].forEach(id => {
    document.getElementById('tab-' + id).style.display = (id === tabId) ? 'block' : 'none';
  });
}
function switchReplyTab(tabId, btn) {
  document.querySelectorAll('#outputSection .section-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  ['english','chinese','questions'].forEach(id => {
    document.getElementById('reply-' + id).style.display = (id === tabId) ? 'block' : 'none';
  });
}
const PARAM_IDS = [
  'p_customer','p_scenario','p_material','p_diameter','p_length','p_medium',
  'p_insulation','p_insulation_type','p_insulation_thickness','p_location','p_special','p_quantity',
  'p_medium_temp','p_maintain_temp','p_max_ambient','p_min_ambient','p_target_temp',
  'p_voltage','p_exproof','p_ip','p_cert','p_country'
];
function updateProgress() {
  let filled = 0;
  PARAM_IDS.forEach(id => {
    const el = document.getElementById(id);
    if (el && el.value && el.value.trim()) filled++;
  });
  const pct = Math.round((filled / PARAM_IDS.length) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `瀹屾暣搴? ${pct}% (${filled}/${PARAM_IDS.length})`;
}
function parseInquiry() {
  const text = document.getElementById('inquiryText').value;
  if (!text.trim()) return showToast('璇峰厛绮樿创璇㈢洏鍐呭');
  const mappings = [
    { id:'p_customer', patterns:[/dear\s+(\w+)/i, /hello\s+(\w+)/i, /attn[:\s]+(\w+)/i, /to[:\s]+(\w+)/i] },
    { id:'p_material', patterns:[/(carbon\s*steel|stainless\s*steel|cs|ss|steel|閾渱涓嶉攬閽纰抽挗|濉戞枡|PVC)/i] },
    { id:'p_diameter', patterns:[/(dn\d{2,3})/i, /(\d{1,3})\s*(inch|inches|")/i, /鍙ｅ緞[锛?]\s*(\d+)/, /鍏О鐩村緞[锛?]\s*(\d+)/] },
    { id:'p_length', patterns:[/(\d+[\d,.]*)\s*(m|meters?|绫硘km)/i] },
    { id:'p_medium', patterns:[/(water|oil|steam|chemical|gas|姘磡娌箌钂告苯|鍖栧鍝亅澶╃劧姘攟姹℃按)/i] },
    { id:'p_maintain_temp', patterns:[/(maintain|maintenance|淇濇寔|缁存寔)\s*(?:temp|temperature|娓╁害)?[锛?\s]*(\d+)/i, /(\d+)\s*掳[cC]\s*(?:maintain|淇濇寔|缁存寔)/i] },
    { id:'p_max_ambient', patterns:[/(?:max|鏈€楂榺maximum)\s*(?:ambient|鐜|姘旀俯)[锛?\s]*(\d+)/i] },
    { id:'p_min_ambient', patterns:[/(?:min|鏈€浣巪minimum)\s*(?:ambient|鐜|姘旀俯)[锛?\s]*(\d+)/i, /(?:ambient|鐜)\s*(?:temp|temperature|娓╁害)[锛?\s]*(-?\d+)/i] },
    { id:'p_target_temp', patterns:[/(?:target|design|璁捐|鐩爣)\s*(?:temp|temperature|娓╁害)?[锛?\s]*(\d+)/i, /杈惧埌\s*(\d+)\s*搴?i] },
    { id:'p_medium_temp', patterns:[/(?:medium|浠嬭川|media|process)\s*(?:temp|temperature|娓╁害)?[锛?\s]*(\d+)/i] },
    { id:'p_exproof', patterns:[/(?:explosion.proof|闃茬垎|EX|ex)\s*(?:class|绛夌骇)?[锛?\s]*(\w+)/i, /Ex\s*[ed]/i] },
    { id:'p_voltage', patterns:[/(\d{3})\s*V/i, /voltage[锛?\s]*(\d+)/i, /鐢靛帇[锛?\s]*(\d+)/i] },
    { id:'p_country', patterns:[/(?:ship|deliver|destination|send|to|鐩殑鍦皘杩愬線|鍑哄彛)[锛?\s]*(\w+\s*\w*)/i, /for\s+(\w+\s*\w*)\s+project/i] },
    { id:'p_scenario', patterns:[/(?:for|application|鐢ㄩ€攟鍦烘櫙|搴旂敤)[锛?\s]*([^銆俓n]+)/i, /(pipeline|pipe|tank|valve|绠￠亾|鍌ㄧ綈|闃€闂▅绠＄嚎)/i] },
    { id:'p_insulation', patterns:[/(?:insulation|淇濇俯|insulated)/i] },
    { id:'p_quantity', patterns:[/(\d+[\d,.]*)\s*(?:km|m|meters?|绫硘濂梶鏍箌鍗穦鏉?/i] },
    { id:'p_cert', patterns:[/(ATEX|IECEx|UL|CSA|CCC|CE|EAC)/i] },
  ];
  let filled = 0;
  mappings.forEach(m => {
    const el = document.getElementById(m.id);
    if (!el || (el.value && el.value.trim())) return;
    for (const pat of m.patterns) {
      const match = text.match(pat);
      if (match) {
        let val = match[1] || match[0];
        if (val.length > 30) val = val.substring(0,30);
        el.value = val;
        filled++;
        break;
      }
    }
  });
  const insEl = document.getElementById('p_insulation');
  if (insEl && insEl.value === '' && /insulation|淇濇俯/i.test(text)) { insEl.value = 'yes'; }
  updateProgress();
  showToast(`瑙ｆ瀽瀹屾垚锛岃嚜鍔ㄥ～鍏呬簡 ${filled} 涓弬鏁癭);
}
function generateReply() {

  if(params.p_ip) eng += `Protection Class: ${params.p_ip}\n`;

  if(params.p_quantity) eng += `Estimated Quantity: ${params.p_quantity}\n`;
  let rec = '\nRecommended Product Type: ';

  else rec+='Self-Regulating (鑷檺娓? / Parallel Constant Power (骞惰仈鎭掑姛鐜?';
  rec += '\n\n*Detailed selection and heat loss calculation will be provided upon confirmation of all parameters.*\n';
  eng += rec;
  eng += `\n--- Next Steps ---\n\n`;
  eng += `1. Please confirm the above parameters are correct\n`;
  eng += `2. We will provide detailed technical proposal and quotation\n`;
  eng += `3. Heat loss calculation & product specification sheet to follow\n\n`;
  if(params.p_country) eng += `Regarding shipment to ${params.p_country}, we will check import regulations and required certifications simultaneously.\n\n`;
  eng += `Looking forward to your feedback.\n\nBest regards,\n[Your Name]\n[Company Name]`;
  document.getElementById('englishReply').value = eng;
  let cn = '===== 瀹㈡埛淇℃伅 =====\n';
  cn += `瀹㈡埛/椤圭洰: ${params.p_customer||'寰呯‘璁?}\n搴旂敤鍦烘櫙: ${params.p_scenario||'寰呯‘璁?}\n鐩殑鍦? ${params.p_country||'寰呯‘璁?}\n\n`;
  cn += '===== 鎶€鏈弬鏁?=====\n';
  cn += `鏉愯川: ${params.p_material||'寰呯‘璁?}\n鍙ｅ緞: ${params.p_diameter||'寰呯‘璁?}\n闀垮害: ${params.p_length||'寰呯‘璁?}\n浠嬭川: ${params.p_medium||'寰呯‘璁?}\n`;
  cn += `浠嬭川娓╁害: ${params.p_medium_temp||'寰呯‘璁?}掳C\n缁存寔娓╁害: ${params.p_maintain_temp||'寰呯‘璁?}掳C\n鐩爣娓╁害: ${params.p_target_temp||'寰呯‘璁?}掳C\n`;
  cn += `鏈€楂樼幆澧冩俯搴? ${params.p_max_ambient||'寰呯‘璁?}掳C\n鏈€浣庣幆澧冩俯搴? ${params.p_min_ambient||'寰呯‘璁?}掳C\n`;
  cn += `鐢靛帇: ${params.p_voltage||'寰呯‘璁?}\n闃茬垎: ${params.p_exproof?(params.p_exproof==='none'?'涓嶉渶瑕?:params.p_exproof):'寰呯‘璁?}\n闃叉姢: ${params.p_ip||'寰呯‘璁?}\n璁よ瘉: ${params.p_cert||'寰呯‘璁?}\n\n`;
  cn += '===== 浜у搧 & 鐗╂祦 =====\n';
  cn += `鏁伴噺: ${params.p_quantity||'寰呯‘璁?}\n淇濇俯: ${params.p_insulation==='yes'?'宸叉湁':params.p_insulation==='no'?'闇€閰嶅':'寰呯‘璁?}\n淇濇俯鏉愭枡: ${params.p_insulation_type||'寰呯‘璁?}\n淇濇俯鍘氬害: ${params.p_insulation_thickness||'寰呯‘璁?}\n`;
  cn += `鐗规畩瑕佹眰: ${params.p_special||'鏃?}\n瀹夎浣嶇疆: ${params.p_location||'寰呯‘璁?}\n\n`;
  cn += '===== 鍚庣画鎿嶄綔娓呭崟 =====\n';
  cn += `鈽?绛夊緟瀹㈡埛纭鍙傛暟\n鈽?鐑崯璁＄畻\n鈽?浜у搧閫夊瀷 & 鎶ヤ环\n鈽?鏌ヨ ${params.p_country||'鐩殑鍦?} 杩涘彛鏀跨瓥/璁よ瘉瑕佹眰\n鈽?纭畾璐ф湡\n鈽?褰㈠紡鍙戠エ & 浠樻鏂瑰紡\n`;
  document.getElementById('chineseReply').value = cn;
  let questions = '';
  const missing = [];
  if(!params.p_material) missing.push('绠￠亾/璁惧鏉愯川 (纰抽挗/涓嶉攬閽?)');

  if(!params.p_medium_temp) missing.push('浠嬭川娓╁害');
  if(!params.p_target_temp&&!params.p_maintain_temp) missing.push('闇€瑕佽揪鍒扮殑鐩爣/缁存寔娓╁害');
  questions += missing.length ? '浠ヤ笅鍙傛暟闇€瑕佸悜瀹㈡埛纭:\n\n'+missing.map((q,i)=>`${i+1}. ${q}`).join('\n') : '涓昏鍙傛暟宸查綈鍏紝鍙互鐩存帴杩涜鏂规璁捐鍜屾姤浠枫€?;
  questions += '\n\n===== 闇€鍚屾鏌ヨ =====\n';
  if(params.p_country) { questions += `鈽?${params.p_country} 杩涘彛鏀跨瓥 & 鍏崇◣\n鈽?${params.p_country} 鐩稿叧琛屼笟璁よ瘉瑕佹眰\n鈽?鏄惁闇€瑕佸綋鍦颁唬鐞?缈昏瘧鏂囦欢\n`; }

function copyCurrentReply() {
  const tabs = ['englishReply','chineseReply','questionsList'];
  for(const id of tabs) {
    const el = document.getElementById(id);
    if(el && el.style.display !== 'none') {
      navigator.clipboard.writeText(el.value).then(()=>showToast('宸插鍒?)).catch(()=>{});
      return;
    }
  }
}
function copyAll() {
  const e=document.getElementById('englishReply').value;
  const c=document.getElementById('chineseReply').value;
  const q=document.getElementById('questionsList').value;
  navigator.clipboard.writeText(`=== ENGLISH REPLY ===\n${e}\n\n=== 涓枃鍐呴儴澶囨敞 ===\n${c}\n\n=== 寰呯‘璁ら棶棰?===\n${q}`).then(()=>showToast('宸插鍒跺叏閮?)).catch(()=>{});
}
function resetAll() {
  PARAM_IDS.forEach(id => { const el = document.getElementById(id); if(el) el.value=''; });
  document.getElementById('inquiryText').value = '';
  document.getElementById('emptyState').style.display = 'block';
  document.getElementById('outputSection').classList.remove('visible');
  document.getElementById('quickInfo').innerHTML = '';
  updateProgress();
  showToast('宸查噸缃?);
}
function clearInquiry() { document.getElementById('inquiryText').value = ''; }
let toastTimer;
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2000);
}
updateProgress();
